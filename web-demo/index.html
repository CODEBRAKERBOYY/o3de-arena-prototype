<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>O3DE Arena Prototype - Web Preview</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="shell">
      <section class="hud" aria-label="Game status">
        <h1>O3DE Arena Prototype</h1>
        <div class="stats">
          <span>Score <strong id="score">0</strong></span>
          <span>Best <strong id="best">0</strong></span>
          <span id="state">Collect cores</span>
        </div>
      </section>
      <canvas id="game" width="960" height="540" aria-label="Arena game preview"></canvas>
      <p class="controls">Move with WASD or arrow keys. Press R to restart.</p>
    </main>
    <script src="game.js"></script>
  </body>
</html>
